name: Build Site

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:                                                                                                                                                                                                                                                                                      
          # full history for Hugo's enableGitInfo commit id resolving
          fetch-depth: 0     
      
      - name: Install tools
        run: |
          mkdir -p tools
          echo "${PWD}/tools" >> $GITHUB_PATH

          # Install hugo pinned version
          HUGO_VERSION="0.160.1"
          HUGO_SHA256="2f72fefa6ce944907f74c36c35abcaa306cdd22e64647a9ee5b328fc0bfb67be"
          curl -sSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz" -o /tmp/hugo.tar.gz
          echo "${HUGO_SHA256} /tmp/hugo.tar.gz" | sha256sum -c -
          tar -zxf /tmp/hugo.tar.gz -C tools hugo
          chmod +x tools/hugo

          # Install tidy
          sudo apt-get -y install tidy

          # Install cosign pinned version
          curl -sSL https://github.com/sigstore/cosign/releases/download/v3.0.6/cosign-linux-amd64 -o /usr/local/bin/cosign
          echo "c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74 /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::148142827637:role/app-linnemanlabs-web-content
          aws-region: us-east-2

      - name: Build and release site bundle
        run: |
          set -x
          make release