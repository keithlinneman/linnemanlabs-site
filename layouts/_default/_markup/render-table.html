{{- /* Wrap markdown tables so wide ones scroll within the reading column instead of widening the page. */ -}}
<div class="table-wrap">
  <table
    {{- range $k, $v := .Attributes }}{{ with $v }} {{ printf "%s=%q" $k . | safeHTMLAttr }}{{ end }}{{ end }}>
    <thead>
      {{- range .THead }}
      <tr>
        {{- range . }}
        <th{{ with .Alignment }} class="ta-{{ . }}"{{ end }}>{{ .Text }}</th>
        {{- end }}
      </tr>
      {{- end }}
    </thead>
    <tbody>
      {{- range .TBody }}
      <tr>
        {{- range . }}
        <td{{ with .Alignment }} class="ta-{{ . }}"{{ end }}>{{ .Text }}</td>
        {{- end }}
      </tr>
      {{- end }}
    </tbody>
  </table>
</div>
