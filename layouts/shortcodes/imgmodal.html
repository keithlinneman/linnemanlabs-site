{{ if eq (.Get "mode") "crop" }}
<figure class="mb-4">
<img src="{{ .Get "src" }}" 
     class="img-lightbox cursor-pointer max-h-[400px] w-full object-cover object-top border border-neutral-700 rounded"
     alt="{{ .Get "alt" }}">
<dialog class="img-lightbox-dialog fixed inset-0 p-0 border-none m-auto max-w-[95vw] max-h-[95vh] overflow-auto backdrop:bg-black/80">
    <img src="{{ .Get "src" }}" class="w-auto h-auto block">
</dialog>
{{ else }}
<figure class="mb-4">
<img src="{{ .Get "src" }}" 
     class="img-lightbox cursor-pointer max-h-[400px] object-contain border border-neutral-700 rounded block mx-auto"
     alt="{{ .Get "alt" }}">
<dialog class="img-lightbox-dialog fixed inset-0 p-0 border-none m-auto max-w-[95vw] max-h-[95vh] overflow-auto backdrop:bg-black/80">
    <img src="{{ .Get "src" }}" class="w-auto h-auto block">
</dialog>
{{ end }}
{{ with .Get "caption" }}
<figcaption class="text-center italic text-neutral-400 mt-2 text-sm">{{ . }}</figcaption>
{{ end }}
</figure>
