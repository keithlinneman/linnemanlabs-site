<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  {{ partial "head-css.html" . }}
  {{ with .Site.Params.logo }}
    <link rel="icon" href="{{ . }}" type="image/svg+xml">
  {{ end }}
</head>
<body class="min-h-screen">
  {{ partial "header.html" . }}

  <main class="mx-auto px-6 py-10 max-w-[1400px]">
    <div class="lg:grid lg:grid-cols-[minmax(0,108ch)_minmax(200px,260px)] lg:gap-12">
      <div class="min-w-0">{{ block "main" . }}{{ end }}</div>
      <aside class="hidden lg:block">{{ block "right-rail" . }}{{ end }}</aside>
    </div>
  </main>

  {{ partial "footer.html" . }}
  {{ block "scripts" . }}{{ end }}
</body>
</html>
