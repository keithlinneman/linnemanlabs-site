baseURL = 'https://linnemanlabs.com/'
languageCode = 'en-us'
title = 'Linneman Labs'
enableRobotsTXT = true
enableGitInfo = true

[pagination]
pagerSize = 25

# where Hugo writes the built site
publishDir = "public"

[taxonomies]
  tag = "tags"
  series = "series"
  channel = "channels"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # dont render html in markdown files for now
      unsafe = false

  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params]
  description = "Building systems, breaking systems, observing systems... improving systems."
  defaultCategory = "Security Research"
  tagline = "building · breaking · observing"
  greetz = "me"
  githubRepo = "https://github.com/keithlinneman/linnemanlabs-site"
  logo = "/favicon.svg"
  logopng = "/icon-512.png"

[params.author]
  name = "Keith Linneman"
  bio = "Building, breaking, and securing infrastructure since the mid-90s"
  github = "keithlinneman"
  url = "/about/me/"

[menus]
  [[menus.main]]
    identifier = "posts"
    name = "Posts"
    weight = 10

  [[menus.main]]
    parent = "posts"
    name = "View All"
    pageRef = "/posts/"
    weight = 1

  [[menus.main]]
    parent = "posts"
    name = "Tags"
    pageRef = "/tags/"
    weight = 1

  [[menus.main]]
    identifier = "about"
    name = "About"
    weight = 20

  [[menus.main]]
    parent = "about"
    name = "Me"
    pageRef = "/about/me/"
    weight = 2

  [[menus.main]]
    parent = "about"
    name = "Infrastructure"
    pageRef = "/about/infrastructure/"
    weight = 3

[[menus.main]]
    parent = "about"
    name = "Provenance"
    pageRef = "/about/provenance/"
    weight = 4

[server]

[[server.redirects]]
fromRe = "^/api/provenance/app/?$"
to = "/dev-api/provenance/app.json"
status = 200
force = true

[[server.redirects]]
fromRe = "^/api/provenance/app/summary/?$"
to = "/dev-api/provenance/app-summary.json"
status = 200
force = true

[[server.redirects]]
fromRe = "^/api/provenance/content/?$"
to = "/dev-api/provenance/content.json"
status = 200
force = true

[[server.redirects]]
fromRe = "^/api/provenance/content/summary/?$"
to = "/dev-api/provenance/content-summary.json"
status = 200
force = true
